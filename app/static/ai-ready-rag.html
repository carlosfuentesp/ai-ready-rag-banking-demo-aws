<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI-Ready RAG</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <nav>
        <a href="index.html">← Comparación</a>
        <a href="basic-rag.html">RAG Común</a>
        <a href="ai-ready-rag.html" aria-current="page">AI-Ready RAG</a>
      </nav>
      <div class="page-title">
        <span class="mode-badge mode-good">AI-Ready RAG</span>
        <h1>Respuesta con datos estructurados y semántica</h1>
        <p class="subtitle">Chunking semántico · Contexto validado desde DynamoDB · Respuesta precisa por cliente</p>
      </div>
    </header>

    <main>
      <section class="query-card">
        <label for="question">Pregunta al sistema</label>
        <div class="presets">
          <span class="presets-label">Ejemplos:</span>
          <button class="preset-btn" type="button" data-q="1">① Cargo online no reconocido</button>
          <button class="preset-btn" type="button" data-q="2">② Retiro ATM en otra ciudad</button>
          <button class="preset-btn" type="button" data-q="3">③ Doble cobro en restaurante</button>
        </div>
        <textarea id="question" rows="4">El cliente C-1023 no reconoce el cargo TX-991 por USD 326.40 de ECOMMERCE_X en su tarjeta de crédito. ¿Qué pasos debe seguir el asesor y puede recomendar bloqueo preventivo?</textarea>
        <button class="btn-query btn-query--good" type="button" data-mode="ai-ready" data-target="results">
          Consultar AI-Ready RAG
        </button>
      </section>

      <div id="results" class="results-area hidden"></div>
    </main>

    <script src="config.js"></script>
    <script src="demo.js"></script>
  </body>
</html>
